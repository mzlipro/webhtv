name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v5.5.1"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools

      - name: Install Android platform
        run: |
          curl -fsSL -o /tmp/platform-37.zip https://dl.google.com/android/repository/platform-37.0_r01.zip
          rm -rf /tmp/platform-37
          mkdir -p /tmp/platform-37 "$ANDROID_HOME/platforms"
          unzip -q /tmp/platform-37.zip -d /tmp/platform-37
          platform_dir="$(dirname "$(find /tmp/platform-37 -name android.jar -print -quit)")"
          test -n "$platform_dir"
          rm -rf "$ANDROID_HOME/platforms/android-37"
          mv "$platform_dir" "$ANDROID_HOME/platforms/android-37"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure release signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          mkdir -p app/signing
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/signing/release.jks
          {
            echo "storeFile=signing/release.jks"
            echo "storePassword=$RELEASE_STORE_PASSWORD"
            echo "keyAlias=$RELEASE_KEY_ALIAS"
            echo "keyPassword=${RELEASE_KEY_PASSWORD:-$RELEASE_STORE_PASSWORD}"
          } >> local.properties

      - name: Build four release APKs
        run: |
          chmod +x ./gradlew
          ./gradlew \
            :app:assembleMobileArm64_v8aRelease \
            :app:assembleMobileArmeabi_v7aRelease \
            :app:assembleLeanbackArm64_v8aRelease \
            :app:assembleLeanbackArmeabi_v7aRelease \
            --no-daemon

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: Release/apk/*.apk
